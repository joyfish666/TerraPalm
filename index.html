<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraPalm - 手势控制3D沙盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        #scene-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        #scene-container canvas {
            display: block;
        }

        /* 摄像头预览窗口 */
        #webcam-preview {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
            background: #111;
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* 帮助提示浮层 */
        #help-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #help-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .help-content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 40px 50px;
            max-width: 520px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .help-content h2 {
            color: #333;
            margin-bottom: 24px;
            font-size: 26px;
            font-weight: 600;
        }

        .help-item {
            display: flex;
            align-items: center;
            margin: 16px 0;
            text-align: left;
        }

        .help-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 24px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .help-text {
            color: #555;
            font-size: 16px;
            line-height: 1.5;
        }

        .help-text strong {
            color: #333;
        }

        /* 复位按钮 */
        #reset-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #reset-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-1px);
        }

        /* 帮助按钮 */
        #help-btn {
            position: fixed;
            top: 20px;
            right: 120px;
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            color: white;
            font-size: 18px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #help-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-1px);
        }

        /* 状态指示器 */
        #status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 10px 18px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 24px;
            color: white;
            font-size: 13px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f44336;
            transition: background 0.3s ease;
            flex-shrink: 0;
        }

        .status-dot.active {
            background: #4CAF50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.6);
        }

        .status-dot.detecting {
            background: #FF9800;
            box-shadow: 0 0 8px rgba(255, 152, 0, 0.6);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 标题水印 */
        #title-watermark {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            font-weight: 600;
            z-index: 10;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
        }

        #title-watermark span {
            font-size: 12px;
            font-weight: 400;
            opacity: 0.7;
            display: block;
            margin-top: 4px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <!-- 3D场景容器 -->
    <div id="scene-container"></div>

    <!-- 摄像头预览 -->
    <div id="webcam-preview">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <!-- 帮助提示浮层 -->
    <div id="help-overlay">
        <div class="help-content">
            <h2>🎮 手势操作指南</h2>
            <div class="help-item">
                <div class="help-icon">✋</div>
                <div class="help-text"><strong>左手张开移动</strong> → 平移地形</div>
            </div>
            <div class="help-item">
                <div class="help-icon">👋</div>
                <div class="help-text"><strong>右手左右摆动</strong> → 旋转地形</div>
            </div>
            <div class="help-item">
                <div class="help-icon">🤜🤛</div>
                <div class="help-text"><strong>双手向外推开</strong> → 放大</div>
            </div>
            <div class="help-item">
                <div class="help-icon">🤛🤜</div>
                <div class="help-text"><strong>双手向内收拢</strong> → 缩小</div>
            </div>
        </div>
    </div>

    <!-- 控制按钮 -->
    <button id="reset-btn">🔄 复位视角</button>
    <button id="help-btn">?</button>

    <!-- 标题 -->
    <div id="title-watermark">
        TerraPalm
        <span>手势控制3D沙盘</span>
    </div>

    <!-- 状态指示 -->
    <div id="status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">等待摄像头...</span>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
